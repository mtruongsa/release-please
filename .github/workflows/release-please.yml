name: Release Please

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            context--tag_name: ${{ steps.release.outputs.context--tag_name}}
            context--release_created: ${{ steps.release.outputs.context--release_created}}
        steps:
            - uses: googleapis/release-please-action@v4
              id: release
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
            - name: Print release outputs for debugging
              continue-on-error: true
              run: |
                  echo "Release outputs:"
                  echo "${{ toJson(steps.release.outputs) }}"

    release-context:
        if: ${{needs.release-please.outputs.context--release_created}}
        runs-on: ubuntu-latest
        needs: release-please
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup-node-env
              with:
                  node-version: 18
                  cache-path: context/node_modules
                  cache-key: "${{hashFiles('yarn.lock')}}"
                  project: context
            - run: ls
            - run: npm test --prefix context -- a --watchAll=false
            - run: npm run build --prefix context
            - run: zip -r context-build.zip context/build
            - name: Upload Release Artifact
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload ${{ needs.release-please.outputs.context--tag_name }} context-build.zip
