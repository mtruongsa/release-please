name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      context--tag_name: ${{ steps.release.outputs.context--tag_name}}
      context--release_created: ${{ steps.release.outputs.context--release_created}}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Print release outputs for debugging
        continue-on-error: true
        run: |
          echo "Release outputs:"
          echo '${{ toJSON(steps.release.outputs) }}'

  release-context:
    if: ${{needs.release-please.outputs.context--release_created}}
    runs-on: ubuntu-latest
    needs: release-please
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup
        run: |
          yarn install
          git tag baseline HEAD^
          echo Using baseline:
          git log -1 --oneline baseline
      - name: Build
        run: yarn build --filter=...[baseline]
      - run: zip -r context-build.zip context/build
      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.context--tag_name }} context-build.zip
